<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry Genius</title>
    <!-- DaisyUI & TailwindCSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .commonStyle{
            align-items: center;
            font-size: 20px;
            font-weight:normal ;
            padding: 15px;
            color: #414141;
            background-color: #F1F1F1;
            border-radius: 8px;
            width: 90%;
            margin: 10px auto;
        }
    </style>
</head>
<body>
    <header>
        <div class="max-w-[1540px] mx-auto">
            <div class="m-5 md:m-10 flex items-center justify-between bg-[#E1F5FB] px-2 py-5 md:p-5 rounded-lg">
                <a class="text-xl "><span class="text-2xl md:text-4xl font-bold text-gray-800">Interactive</span> <br> <span class="text-xl md:text-3xl font-semibold text-gray-600">Gemometry Genius</span></a>
                <a class="btn px-5 text-white bg-[#1090D8]">Blog</a>
            </div>
        </div>
    </header>

    <main class="max-w-[1540px] mx-auto">
        <div class="m-5 md:m-10">
            <div class="flex flex-col gap-20 justify-between lg:flex-row w-full">
                <!-- Geometry Cards -->
                <div class="grid gap-10 grid-cols-1 md:grid-cols-2 xl:grid-cols-3 lg:w-2/3">
                    <!-- Triangle Card -->
                    <div class="card border-2 border-gray-200 p-5 pt-0 min-h-[500px]">
                        <figure class="h-[240px]">
                            <img src="images/triangle.png" alt="Triangle" />
                        </figure>
                        <div class="card-body items-center pt-5 p-0 text-[#414141]">
                            <h2 class="card-title text-2xl font-bold">Triangle</h2>
                            <p class="text-base md:text-xl font-medium">Area (A) = 0.5 × b × h</p>
                            <div class="flex items-center gap-2 md:gap-5 mt-2 mb-2 p-0">
                                <div>
                                    <input id="triangle-base"
                                        class="w-24 h-10 p-2 text-base border-none rounded-lg bg-[#F1F1F1]" type="text" name=""
                                        placeholder="b">
                                    <span class="text-lg font-semibold">cm</span>
                                </div>
                                <div>
                                    <input id="triangle-height"
                                        class="w-24 h-10 p-2 text-base border-none rounded-lg bg-[#F1F1F1]" type="text" name=""
                                        placeholder="h">
                                    <span class="text-lg font-semibold">cm</span>
                                </div>
                            </div>
                            <div class="card-actions w-full">
                                <button onclick="triangleClick()"
                                    class="btn btn-neutral border-none shadow-none text-xl bg-blue-600 w-full">Calculate</button>
                            </div>
                        </div>
                    </div>
                    <!-- Rectangle Card -->
                    <div class="card border-2 border-gray-200 p-5 pt-0 min-h-[500px]">
                        <figure class="h-[240px]">
                            <img src="images/rectangle.png" alt="Rectangle" />
                        </figure>
                        <div class="card-body items-center pt-5 p-0 text-[#414141]">
                            <h2 class="card-title text-2xl font-bold">Rectangle</h2>
                            <p class="text-base md:text-xl font-medium">Area (A) = w × l</p>
                            <div class="flex items-center gap-2 md:gap-5 mt-2 mb-2 p-0">
                                <div>
                                    <input id="rectangle-width"
                                        class="w-24 h-10 p-2 text-base border-none rounded-lg bg-[#F1F1F1]" type="text" name=""
                                        placeholder="w">
                                    <span class="text-lg font-semibold">cm</span>
                                </div>
                                <div>
                                    <input id="rectangle-length"
                                        class="w-24 h-10 p-2 text-base border-none rounded-lg bg-[#F1F1F1]" type="text" name=""
                                        placeholder="l">
                                    <span class="text-lg font-semibold">cm</span>
                                </div>
                            </div>
                            <div class="card-actions w-full">
                                <button onclick="rectangleClick()"
                                    class="btn btn-neutral border-none shadow-none text-xl bg-blue-600 w-full">Calculate</button>
                            </div>
                        </div>
                    </div>
                    <!-- Parallelogram Card -->
                    <div class="card border-2 border-gray-200 p-5 pt-0 min-h-[500px]">
                        <figure class="h-[240px]">
                            <img src="images/parallelogram.png" alt="Parallelogram" />
                        </figure>
                        <div class="card-body items-center pt-5 p-0 text-[#414141]">
                            <h2 class="card-title text-2xl font-bold">Parallelogram</h2>
                            <p class="text-base md:text-xl font-medium">Area (A) = b × h</p>
                            <div class="flex items-center gap-2 md:gap-5 mt-2 mb-2 p-0">
                                <div>
                                    <input id="parallelogram-base"
                                        class="w-24 h-10 p-2 text-base border-none rounded-lg bg-[#F1F1F1]" type="text" name=""
                                        placeholder="b">
                                    <span class="text-lg font-semibold">cm</span>
                                </div>
                                <div>
                                    <input id="parallelogram-height"
                                        class="w-24 h-10 p-2 text-base border-none rounded-lg bg-[#F1F1F1]" type="text" name=""
                                        placeholder="h">
                                    <span class="text-lg font-semibold">cm</span>
                                </div>
                            </div>
                            <div class="card-actions w-full">
                                <button onclick="parallelogramClick()"
                                    class="btn btn-neutral border-none shadow-none text-xl bg-blue-600 w-full">Calculate</button>
                            </div>
                        </div>
                    </div>
                    <!-- Rhombus Card -->
                    <div class="card border-2 border-gray-200 p-5 pt-0 min-h-[500px]">
                        <figure class="h-[240px]">
                            <img src="images/rhombus.png" alt="Rhombus" />
                        </figure>
                        <div class="card-body items-center pt-5 p-0 text-[#414141]">
                            <h2 class="card-title text-2xl font-bold">Rhombus</h2>
                            <p class="text-base md:text-xl font-medium">Area (A) = 0.5 × d<sub>1</sub> × d<sub>2</sub></p>
                            <div class="flex items-center gap-2 md:gap-5 mt-2 mb-2 p-0">
                                <div>
                                    <input id="rhombus-diagonal-1"
                                        class="w-24 h-10 p-2 text-base border-none rounded-lg bg-[#F1F1F1]" type="text" name=""
                                        placeholder="d₁">
                                    <span class="text-lg font-semibold">cm</span>
                                </div>
                                <div>
                                    <input id="rhombus-diagonal-2"
                                        class="w-24 h-10 p-2 text-base border-none rounded-lg bg-[#F1F1F1]" type="text" name=""
                                        placeholder="d₂">
                                    <span class="text-lg font-semibold">cm</span>
                                </div>
                            </div>
                            <div class="card-actions w-full">
                                <button onclick="rhombusClick()"
                                    class="btn btn-neutral border-none shadow-none text-xl bg-blue-600 w-full">Calculate</button>
                            </div>
                        </div>
                    </div>
                    <!-- Pentagon Card -->
                    <div class="card border-2 border-gray-200 p-5 pt-0 min-h-[500px]">
                        <figure class="h-[240px]">
                            <img src="images/Pentagon.png" alt="Pentagon" />
                        </figure>
                        <div class="card-body items-center pt-5 p-0 text-[#414141]">
                            <h2 class="card-title text-2xl font-bold">Pentagon</h2>
                            <p class="text-base md:text-xl font-medium">Area (A) = 0.5 × p × a</p>
                            <div class="flex items-center gap-2 md:gap-5 mt-2 mb-2 p-0">
                                <div>
                                    <input id="pentagon-perimeter"
                                        class="w-24 h-10 p-2 text-base border-none rounded-lg bg-[#F1F1F1]" type="text" name=""
                                        placeholder="p">
                                    <span class="text-lg font-semibold">cm</span>
                                </div>
                                <div>
                                    <input id="pentagon-apothem"
                                        class="w-24 h-10 p-2 text-base border-none rounded-lg bg-[#F1F1F1]" type="text" name=""
                                        placeholder="a">
                                    <span class="text-lg font-semibold">cm</span>
                                </div>
                            </div>
                            <div class="card-actions w-full">
                                <button onclick="pentagonClick()"
                                    class="btn btn-neutral border-none shadow-none text-xl bg-blue-600 w-full">Calculate</button>
                            </div>
                        </div>
                    </div>
                    <!-- Ellipse Card -->
                    <div class="card border-2 border-gray-200 p-5 pt-0 min-h-[500px]">
                        <figure class="h-[240px]">
                            <img src="images/Ellipse.png" alt="Ellipse" />
                        </figure>
                        <div class="card-body items-center pt-5 p-0 text-[#414141]">
                            <h2 class="card-title text-2xl font-bold">Ellipse</h2>
                            <p class="text-base md:text-xl font-medium">Area (A) = π × a × b</p>
                            <div class="flex items-center gap-2 md:gap-5 mt-2 mb-2 p-0">
                                <div>
                                    <input id="ellipse-a-axis"
                                        class="w-24 h-10 p-2 text-base border-none rounded-lg bg-[#F1F1F1]" type="text" name=""
                                        placeholder="a">
                                    <span class="text-lg font-semibold">cm</span>
                                </div>
                                <div>
                                    <input id="ellipse-b-axis"
                                        class="w-24 h-10 p-2 text-base border-none rounded-lg bg-[#F1F1F1]" type="text" name=""
                                        placeholder="b">
                                    <span class="text-lg font-semibold">cm</span>
                                </div>
                            </div>
                            <div class="card-actions w-full">
                                <button onclick="ellipseClick()"
                                    class="btn btn-neutral border-none shadow-none text-xl bg-blue-600 w-full">Calculate</button>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Area Calculation -->
                <div id="area-calculator" class="border-2 rounded-lg border-gray-200 p-5 md:p-10 lg:w-1/3 min-h-[450px]">
                    <h1 class="text-3xl font-semibold text-[#414141] text-center pb-10 underline">Area Calculation</h1>
                </div>
            </div>
        </div>
    </main>
    <script src="JS/script.js"></script>
</body>
</html>
