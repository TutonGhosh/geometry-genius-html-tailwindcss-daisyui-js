<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry Genius</title>
    <!-- DaisyUI & TailwindCSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .commonStyle{
            align-items: center;
            font-size: 20px;
            font-weight:normal ;
            padding: 10px;
            color: #414141;
            background-color: #F1F1F1;
            border-radius: 8px;
            width: 80%;
            margin: 10px auto;
        }
    </style>
</head>
<body>
    <header>

    </header>

    <main class="m-5 md:m-10">
        <div class="flex flex-col-reverse gap-20 justify-between lg:flex-row w-full">
            <!-- Geometry Cards -->
            <div class="grid gap-10 grid-cols-1 md:grid-cols-2 xl:grid-cols-3 lg:w-2/3">
                <!-- Triangle Card -->
                <div class="card border-2 border-gray-200 p-5 h-[450px]">
                    <figure>
                        <img src="images/triangle.png" alt="Triangle"/>
                    </figure>
                    <div class="card-body items-center pt-5 p-0 text-[#414141]">
                        <h2 class="card-title text-2xl font-bold">Triangle</h2>
                        <p class="text-base md:text-xl font-medium">Area (A) = 0.5 X b X h</p>
                        <div class="flex items-center gap-2 md:gap-5 mt-2 mb-2 p-0">
                            <div>
                                <input id="triangle-base" class="w-24 h-10 p-2 text-base border-none rounded-lg bg-[#F1F1F1]" type="text" name="" placeholder="b">
                                <span class="text-lg font-semibold">cm</span>
                            </div>
                            <div>
                                <input id="triangle-height" class="w-24 h-10 p-2 text-base border-none rounded-lg bg-[#F1F1F1]" type="text" name="" placeholder="h">
                                <span class="text-lg font-semibold">cm</span>
                            </div>
                        </div>
                        <div class="card-actions w-full">
                            <button onclick="triangleClick()" class="btn btn-neutral border-none shadow-none text-xl bg-blue-600 w-full">Calculate</button>
                        </div>
                    </div>
                </div>
                <!-- Rectangle Card -->
                <div class="card border-2 border-gray-200 p-5 h-[450px]">
                    <figure>
                        <img src="images/rectangle.png" alt="Rectangle"/>
                    </figure>
                    <div class="card-body items-center pt-5 p-0 text-[#414141]">
                        <h2 class="card-title text-2xl font-bold">Rectangle</h2>
                        <p class="text-base md:text-xl font-medium">Area (A) = w X l</p>
                        <div class="flex items-center gap-2 md:gap-5 mt-2 mb-2 p-0">
                            <div>
                                <input id="rectangle-width" class="w-24 h-10 p-2 text-base border-none rounded-lg bg-[#F1F1F1]" type="text" name="" placeholder="w">
                                <span class="text-lg font-semibold">cm</span>
                            </div>
                            <div>
                                <input id="rectangle-length" class="w-24 h-10 p-2 text-base border-none rounded-lg bg-[#F1F1F1]" type="text" name="" placeholder="l">
                                <span class="text-lg font-semibold">cm</span>
                            </div>
                        </div>
                        <div class="card-actions w-full">
                            <button onclick="rectangleClick()" class="btn btn-neutral border-none shadow-none text-xl bg-blue-600 w-full">Calculate</button>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Area Calculation -->
            <div id="area-calculator" class="border-2 rounded-lg border-gray-200 p-5 md:p-10 lg:w-1/3 h-auto">
                <h1 class=" text-3xl font-semibold text-[#414141] text-center pb-10 underline">Area Calculation</h1>
            </div>
        </div>
    </main>
    <script src="JS/script.js"></script>
</body>
</html>
